<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>עמוס, אפשר לצאת מהמקלט?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0b0d;
      --surface: #111318;
      --border:  #1e2028;
      --red:     #e63946;
      --red-dim: #7a1a22;
      --green:   #2dc653;
      --yellow:  #f4a261;
      --text:    #d4d8e2;
      --muted:   #555b6e;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'Heebo', sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text); font-family:var(--sans);
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      padding:40px 16px 80px;
      background-image:radial-gradient(ellipse 80% 40% at 50% -10%, rgba(230,57,70,0.08) 0%, transparent 70%);
    }
    header { width:100%; max-width:640px; margin-bottom:32px; display:flex; align-items:flex-start; gap:16px; }
    .logo-badge {
      width:48px; height:48px; border-radius:50%; border:2px solid var(--red);
      display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative;
      animation:pulse-ring 3s ease-in-out infinite;
    }
    .logo-badge::after {
      content:''; position:absolute; inset:-6px; border-radius:50%;
      border:1px solid var(--red-dim); animation:pulse-ring 3s ease-in-out infinite .5s;
    }
    @keyframes pulse-ring { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
    .logo-badge svg { width:24px; height:24px; fill:var(--red); }
    .header-text h1 { font-size:22px; font-weight:900; letter-spacing:-.5px; line-height:1.2; }
    .header-text p  { font-size:12px; color:var(--muted); font-family:var(--mono); margin-top:4px; }
    .card {
      width:100%; max-width:640px; background:var(--surface);
      border:1px solid var(--border); border-radius:12px; padding:28px; margin-bottom:16px;
    }
    .card-label { font-family:var(--mono); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    .select-wrap { position:relative; }
    select {
      width:100%; background:var(--bg); color:var(--text);
      border:1px solid var(--border); border-radius:8px;
      padding:14px 16px 14px 48px; font-family:var(--sans); font-size:16px;
      appearance:none; cursor:pointer; transition:border-color .2s; direction:rtl;
    }
    select:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(230,57,70,.15); }
    select option { background:#111; }
    .select-arrow { position:absolute; left:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); font-size:12px; }
    button#check-btn {
      width:100%; margin-top:14px; padding:14px;
      background:var(--red); color:#fff; border:none; border-radius:8px;
      font-family:var(--sans); font-size:16px; font-weight:700;
      cursor:pointer; transition:background .2s, transform .1s;
    }
    button#check-btn:hover  { background:#c8303c; }
    button#check-btn:active { transform:scale(.98); }
    button#check-btn:disabled { background:var(--muted); cursor:not-allowed; }
    #result { width:100%; max-width:640px; display:none; }
    .status-banner { border-radius:12px; padding:24px 28px; border:1px solid; animation:slide-in .3s ease; }
    @keyframes slide-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .status-banner.alert-active  { background:rgba(230,57,70,.08);  border-color:var(--red); }
    .status-banner.alert-none    { background:rgba(45,198,83,.06);  border-color:rgba(45,198,83,.3); }
    .status-banner.alert-history { background:rgba(244,162,97,.06); border-color:rgba(244,162,97,.3); }
    .status-banner.alert-error   { background:rgba(85,91,110,.15);  border-color:var(--border); }
    .status-icon  { font-size:32px; margin-bottom:12px; display:block; }
    .status-title { font-size:20px; font-weight:900; margin-bottom:6px; }
    .alert-active  .status-title { color:var(--red); }
    .alert-none    .status-title { color:var(--green); }
    .alert-history .status-title { color:var(--yellow); }
    .status-body { font-size:14px; line-height:1.8; margin-top:10px; }
    .meta-row { display:flex; gap:20px; margin-top:16px; flex-wrap:wrap; }
    .meta-item { display:flex; flex-direction:column; gap:2px; }
    .meta-key { font-family:var(--mono); font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
    .meta-val { font-family:var(--mono); font-size:14px; font-weight:600; }
    #loading { display:none; text-align:center; padding:32px; color:var(--muted); font-family:var(--mono); font-size:13px; }
    .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .disclaimer {
      width:100%; max-width:640px;
      background:rgba(244,162,97,.06); border:1px solid rgba(244,162,97,.2);
      border-radius:8px; padding:12px 16px; font-size:12px;
      color:var(--yellow); margin-bottom:16px; line-height:1.6;
    }
    footer { margin-top:32px; font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; line-height:1.8; }
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--muted); margin-left:6px; vertical-align:middle; }
    .dot.live { background:var(--green); animation:blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px; }
    th { padding:4px 8px 4px 0; font-weight:400; color:var(--muted); text-align:right; }
    td { padding:6px 8px 6px 0; border-top:1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 2a8 8 0 1 1 0 16A8 8 0 0 1 12 4zm0 2a6 6 0 1 0 0 12A6 6 0 0 0 12 6zm-1 2h2v5h-2zm0 6h2v2h-2z"/></svg>
  </div>
  <div class="header-text">
    <h1>עמוס, אפשר לצאת מהמקלט?</h1>
    <p>בדיקת התראות פעילות · oref.org.il</p>
  </div>
</header>

<div class="disclaimer">
  <strong>⚠️ חשוב מאוד:</strong>
  יש לפעול תמיד לפי <strong>ההנחיה האחרונה</strong> שהתקבלה מפיקוד העורף.
  <strong>אין לצאת מהמקלט ללא הודעה מפורשת</strong> על סיום ההתראה.
  כלי זה הוא בדיקה טכנית בלבד — לאישור יציאה, השתמשו <strong>רק</strong> באפליקציה הרשמית.
</div>

<div class="card">
  <div class="card-label">בחר אזור / יישוב</div>
  <div class="select-wrap">
    <select id="region-select"><option value="">⏳ טוען רשימת אזורים...</option></select>
    <span class="select-arrow">▼</span>
  </div>
  <button id="check-btn" disabled onclick="checkAlerts()">בדוק התראות לאזור זה</button>
</div>

<div id="loading"><div class="spinner"></div>בודק התראות...</div>
<div id="result"></div>

<footer>
  <span class="dot live"></span>
  <span id="status-text">טוען נתונים...</span>
</footer>

<script>
const OREF = {
  cities:  'https://www.oref.org.il/Shared/Ajax/GetCitiesMix.aspx?lang=he',
  alerts:  'https://www.oref.org.il/WarningMessages/alert/alerts.json',
  history: 'https://www.oref.org.il/WarningMessages/History/AlertsHistory.json',
};

// allorigins מחזיר { contents: "<json string>", status: {...} }
// /get עובד יותר טוב מ-/raw לגבי oref
function proxy(url) {
  return 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
}

async function orefFetch(url) {
  const res = await fetch(proxy(url), { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const wrapper = await res.json();
  const raw = wrapper.contents;
  if (!raw || raw.trim() === '') return null;
  return JSON.parse(raw);
}

const sel     = document.getElementById('region-select');
const btn     = document.getElementById('check-btn');
const loading = document.getElementById('loading');
const result  = document.getElementById('result');
const statusT = document.getElementById('status-text');
const STORE   = 'oref_city';

async function loadCities() {
  try {
    const data = await orefFetch(OREF.cities);
    const cities = [...new Set(data.map(c => c.label).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b, 'he'));
    sel.innerHTML = '<option value="">— בחר יישוב / אזור —</option>';
    cities.forEach(city => {
      const o = document.createElement('option');
      o.value = o.textContent = city;
      sel.appendChild(o);
    });
    btn.disabled = false;
    statusT.textContent = `נטענו ${cities.length} יישובים · ${new Date().toLocaleTimeString('he-IL')}`;
    restoreCity();
  } catch (err) {
    sel.innerHTML = '<option value="">⚠️ שגיאה בטעינה</option>';
    statusT.textContent = 'שגיאה: ' + err.message;
  }
}

sel.addEventListener('change', () => { if (sel.value) localStorage.setItem(STORE, sel.value); });

function restoreCity() {
  const saved = localStorage.getItem(STORE);
  if (!saved) return;
  const opt = [...sel.options].find(o => o.value === saved);
  if (opt) {
    sel.value = saved;
    sel.style.borderColor = 'var(--green)';
    setTimeout(() => sel.style.borderColor = '', 1500);
    statusT.textContent += ' · שוחזר: ' + saved;
  }
}

async function checkAlerts() {
  const city = sel.value;
  if (!city) return;
  btn.disabled = true;
  loading.style.display = 'block';
  result.style.display  = 'none';
  try {
    // 1) התראה חיה
    let liveAlert = null;
    try {
      const live = await orefFetch(OREF.alerts);
      if (live && Array.isArray(live.data)) {
        const match = live.data.find(d => d === city || d.includes(city) || city.includes(d));
        if (match) liveAlert = { title: live.title, area: match };
      }
    } catch (err) { console.warn('live:', err); }

    if (liveAlert) { render('active', city, liveAlert, null); return; }

    // 2) היסטוריה
    const history = await orefFetch(OREF.history);
    const cityH = Array.isArray(history)
      ? history.filter(h => h.data === city || (h.data && (h.data.includes(city) || city.includes(h.data))))
      : [];
    render(cityH.length > 0 ? 'history' : 'none', city, null, cityH);
  } catch (err) {
    renderError('שגיאה: ' + err.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function render(type, city, live, hist) {
  result.style.display = 'block';
  if (type === 'active') {
    result.innerHTML = `
      <div class="status-banner alert-active">
        <span class="status-icon">🚨</span>
        <div class="status-title">⛔ אל תצא — יש התראה פעילה!</div>
        <div class="status-body">
          התראה פעילה עכשיו עבור <strong>${e(live.area)}</strong>.<br><br>
          המתן להנחיה מפורשת על סיום ההתראה לפני היציאה.
        </div>
        <div class="meta-row">
          <div class="meta-item"><span class="meta-key">כותרת</span><span class="meta-val">${e(live.title||'—')}</span></div>
          <div class="meta-item"><span class="meta-key">יישוב</span><span class="meta-val">${e(city)}</span></div>
          <div class="meta-item"><span class="meta-key">זמן</span><span class="meta-val">עכשיו</span></div>
        </div>
      </div>`;
    return;
  }
  if (type === 'none') {
    result.innerHTML = `
      <div class="status-banner alert-none">
        <span class="status-icon">✅</span>
        <div class="status-title">לא נמצאו התראות פעילות</div>
        <div class="status-body">
          לא נמצאו התראות פעילות עבור <strong>${e(city)}</strong>.<br><br>
          📢 <strong>יש לפעול תמיד לפי ההנחיה האחרונה שהתקבלה.</strong><br>
          אין לצאת מהמקלט ללא הודעה מפורשת, גם אם אין התראה פעילה כרגע.<br><br>
          <small style="color:var(--muted)">לאישור — בדקו ישירות באפליקציה הרשמית של פיקוד העורף.</small>
        </div>
      </div>`;
    return;
  }
  const last = hist[0], count = hist.length;
  result.innerHTML = `
    <div class="status-banner alert-history">
      <span class="status-icon">📋</span>
      <div class="status-title">אין התראה פעילה כרגע</div>
      <div class="status-body">
        <strong>${e(city)}</strong> — לא נמצאה התראה פעילה. נמצאו <strong>${count}</strong> התראות בהיסטוריה.<br><br>
        📢 <strong>יש לפעול לפי ההנחיה האחרונה מפיקוד העורף.</strong><br>
        אין לצאת ללא הודעה מפורשת על סיום ההתראה.
      </div>
      <div class="meta-row">
        <div class="meta-item"><span class="meta-key">התראה אחרונה</span><span class="meta-val">${e(last.date||'—')} ${e(last.time||'')}</span></div>
        <div class="meta-item"><span class="meta-key">סוג</span><span class="meta-val">${e(last.category_desc||last.title||'—')}</span></div>
        <div class="meta-item"><span class="meta-key">סה"כ בהיסטוריה</span><span class="meta-val">${count}</span></div>
      </div>
      ${count > 1 ? `
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
        <div class="card-label" style="margin-bottom:8px">5 התראות אחרונות</div>
        <table>
          <thead><tr><th>תאריך</th><th>שעה</th><th>סוג</th></tr></thead>
          <tbody>${hist.slice(0,5).map(r=>`
            <tr>
              <td>${e(r.date||'—')}</td>
              <td>${e(r.time||'—')}</td>
              <td style="color:var(--yellow)">${e(r.category_desc||r.title||'—')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>`;
}

function renderError(msg) {
  loading.style.display = 'none';
  result.style.display = 'block';
  result.innerHTML = `
    <div class="status-banner alert-error">
      <span class="status-icon">⚠️</span>
      <div class="status-title" style="color:var(--muted)">שגיאה</div>
      <div class="status-body">${e(msg)}</div>
    </div>`;
}

function e(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadCities();
</script>
</body>
</html>
